name: Claude Autorevert Advisor

on:
  workflow_dispatch:
    inputs:
      suspect_commit:
        description: "SHA of the commit autorevert suspects caused the failure"
        required: true
        type: string
      pr_number:
        description: "PR number of the suspect commit"
        required: true
        type: string
      signal_pattern:
        description: "JSON object with signal metadata and a commits[] array (each labeled failed/unknown/successful/prior, with events[] carrying job links, log URLs, and per-test outcome rows for TEST signals)"
        required: true
        type: string

jobs:
  analyze:
    if: github.repository == 'pytorch/pytorch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: bedrock
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout pytorch/pytorch trunk
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 128

      - name: Fetch suspect commit
        run: |
          git fetch origin ${{ inputs.suspect_commit }} --depth=32 || true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_claude_code
          aws-region: us-east-1

      - name: Run AI Advisor
        id: claude
        uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1.0.89
        with:
          allowed_bots: "pytorch-auto-revert[bot],pytorch-bot[bot]"
          use_bedrock: "true"
          claude_args: |
            --model global.anthropic.claude-opus-4-6-v1
            --allowedTools "Bash,Read,Glob,Grep,WebFetch"
            --json-schema '{"type":"object","required":["verdict","confidence","summary","causal_reasoning"],"properties":{"verdict":{"type":"string","enum":["revert","unsure","not_related","garbage"]},"confidence":{"type":"number","minimum":0,"maximum":1},"summary":{"type":"string","description":"1-3 sentence explanation of the verdict"},"causal_reasoning":{"type":"string","description":"Detailed explanation of the causal chain (or lack thereof) between the code change and the observed failures"}}}'
          settings: '{"alwaysThinkingEnabled": true}'
          prompt: |
            You are an AI advisor for PyTorch's autorevert system. Your job is to analyze a suspect commit and CI failures to determine whether the commit caused the failures.

            ## Context

            **Suspect commit:** ${{ inputs.suspect_commit }}
            **PR:** https://github.com/pytorch/pytorch/pull/${{ inputs.pr_number }}

            **Signal pattern (partition data from autorevert):**
            ```json
            ${{ inputs.signal_pattern }}
            ```

            The signal pattern contains:
            - `signal_key`: the **authoritative** identifier of the specific failure on this signal (test path or job name). Treat it as ground truth — every event in the failed partition is a job that exhibits this exact failure. You do NOT need to re-derive which test/job failed from logs; signal extraction has already done so.
            - `signal_source`: `"test"` (individual test) or `"job"` (whole job).
            - `workflow_name`: the CI workflow where this signal lives.
            - `commits[]`: an array of commits with a `partition` label and an `events[]` array of CI observations. Partition labels:
              - `"failed"` — commits where this signal FAILS, at or after the suspect commit (newest first). The suspect commit is marked with `is_suspect: true`.
              - `"successful"` — baseline commits where this signal was GREEN before the suspect commit. These prove the signal was passing.
              - `"unknown"` — commits between failed and successful with no resolved events (pending or missing data).
              - `"prior"` — older commits before the successful baseline. The signal may have been fixed and then failed again here; do not assume causation from prior failures.
            - `events[].status`: `"failure"` / `"success"` / `"pending"`. Each event also includes `job_id`, `wf_run_id`, `run_attempt`, `started_at`, and (when `job_id` is set) `url` and `log_url`.
            - `events[].test_failures` (TEST signals only, when available): a list of `{file, classname, name, failure_runs, success_runs}` rows from `tests.all_test_runs`, attached to the event by `job_id`. These land in ClickHouse **before** the parent `workflow_job` reaches `completed`, so they are usable evidence even when the event's `status` is `"pending"` or its `log_url` is empty.

            The signal extraction is ground truth: the signal transitioned from SUCCESS to FAILURE at the suspect commit. Your job is to determine whether the CODE CHANGE caused the transition, or whether it's coincidence (upstream dependency change, flaky environment, infra issue).

            ## Partial Visibility Warning

            **Events with `status: "pending"` are NORMAL.** The autorevert system dispatches this advisor as soon as a failure is detected on the suspect commit. At that moment, many other commits' workflow jobs for the same signal are still running (`in_progress`) or queued. They appear as `status: "pending"` in the signal pattern.

            Key implications:

            - A `pending` event means **"this job has not finished yet"** — it is NOT evidence of a stuck or hanging job, NOT evidence of failure, and NOT evidence of flake.
            - The `failed` partition will often contain mostly pending events. This is expected: the suspect commit's job failed, which triggered the advisor, but newer commits' jobs for the same signal haven't finished yet.
            - **Do NOT cite pending events as evidence for any verdict.** Pending events carry zero diagnostic signal about whether the job will ultimately pass or fail.
            - The only events with diagnostic value for status are those with `status: "failure"` (completed and failed) or `status: "success"` (completed and passed).
            - **`log_url` for pending events will return empty or incomplete data** — the job hasn't finished writing logs yet. This is expected, not a problem.
            - If the failed partition has very few completed (failure/success) events, that is a **data-availability limitation**, not an infra problem.
            - For TEST signals, `events[].test_failures` is the most reliable evidence available — it is recorded **before** the parent `workflow_job` reaches `completed`. Use it whenever it is present, even on `pending` events.

            ## Investigation Steps

            1. **Read the suspect commit diff.** Run `git show ${{ inputs.suspect_commit }}` to understand what code changed. Read the modified files to understand the broader context around the changes.

            2. **Analyze the PR.** Fetch the PR description and understand the intent of the change: `gh pr view ${{ inputs.pr_number }} --repo pytorch/pytorch --json title,body,files`

            3. **Investigate the failed jobs.** For each job in the failed_partition:
               - Fetch the job logs from the log_url to find error messages, stack traces, and assertion failures
               - Identify the specific test(s) or build step(s) that failed
               - Read the relevant test source code in this checkout to understand what the test exercises

            4. **Trace the causal chain.** This is the critical step. Do NOT take shortcuts:
               - Trace imports, function calls, class hierarchies, and runtime dispatch paths from the changed code to the failing tests
               - Consider indirect dependencies: a change to a utility function may break tests through several layers of abstraction
               - Consider runtime behavior: changes to tensor operations, kernel dispatch, autograd behavior, or compilation paths can have non-obvious downstream effects
               - Check if the error message or stack trace references any of the changed code, even indirectly

            5. **Check for alternative explanations:**
               - Is this a known flaky test? (Look for skip/xfail decorators, recent similar failures on other commits)
               - Is this an infrastructure issue? (OOM, timeout, network error, GPU driver issue)
               - Did a different concurrent commit plausibly cause this? (Check the commit timestamp and other recent merges)
               - Is this signal fundamentally unreliable? (Persistent timeouts, environment-dependent flakes, resource exhaustion not caused by any code change)

            6. **Render your verdict:**
               - `revert` — You found a plausible causal chain from the code change to the failure. Confidence should reflect how direct and clear the chain is.
               - `not_related` — After thorough investigation, there is no plausible causal chain. The failure has a clear alternative explanation.
               - `unsure` — The investigation is inconclusive. There may be a connection but you cannot confirm it with sufficient confidence.
               - `garbage` — The signal itself is unreliable and should be temporarily suppressed. Use ONLY when you find **concrete, verifiable infrastructure evidence in completed job logs**: HTTP error codes from dependency mirrors, ECR/docker pull failures with specific error messages, runner pool exhaustion errors, GPU driver crash signatures, OOM kills visible in dmesg output, or similar signal-wide infra failures. This tells autorevert to ignore this signal for ~2 hours.

            **`garbage` guardrails — read carefully, this is the most common failure mode of this advisor:**

            - **The most important rule: a `garbage` verdict requires evidence from a `completed` job — i.e., an event with `status: "failure"` (or `status: "success"`) whose `log_url` returned non-empty content with a concrete infra error.** Without that, you do not have evidence; you have a guess.
            - **NEVER issue `garbage` based on pending events alone.** A failed partition that is mostly `pending` is the normal state at dispatch time, not evidence of infra problems or hanging jobs. The jobs are still running.
            - **NEVER issue `garbage` because you couldn't fetch logs for pending jobs.** That's expected — the jobs haven't finished writing logs yet. Empty `log_url` from a pending event is not evidence; it is the absence of evidence.
            - **NEVER call jobs "stuck" or "hanging" based on `status: "pending"`.** "Pending" means "not yet completed", not "hung".
            - If you cannot find concrete infra evidence in completed job logs, default to `unsure`.
            - For TEST signals, prefer trusting `events[].test_failures` and the `signal_key`-identified test over speculating about job-level infra. The signal extraction has already pinned which test failed; you do not need to re-derive that.

            When in doubt between `unsure` and `not_related`, prefer `unsure`. When in doubt between `garbage` and `unsure`, prefer `unsure`. A false `not_related` verdict is more costly than an `unsure` (which just lets autorevert continue its normal restart-to-confirm flow). A false `garbage` suppresses the signal for ~2 hours, potentially delaying a legitimate revert.

            IMPORTANT: Be thorough. Read actual code. Trace actual call paths. Do not guess based on file names alone.

      - name: Save verdict artifact
        if: always() && steps.claude.outputs.structured_output != ''
        env:
          VERDICT_JSON: ${{ steps.claude.outputs.structured_output }}
        run: |
          mkdir -p /tmp/verdict
          printf '%s' "$VERDICT_JSON" > /tmp/verdict/verdict.json
          cat /tmp/verdict/verdict.json

      - name: Upload verdict artifact
        if: always() && steps.claude.outputs.structured_output != ''
        uses: actions/upload-artifact@v4
        with:
          name: autorevert-verdict
          path: /tmp/verdict/verdict.json
          retention-days: 30

      - name: Upload verdict to S3 for ClickHouse ingestion
        if: always() && steps.claude.outputs.structured_output != ''
        env:
          VERDICT_JSON: ${{ steps.claude.outputs.structured_output }}
          SIGNAL_PATTERN: ${{ inputs.signal_pattern }}
        run: |
          # Build enriched verdict JSON with signal metadata for CH ingestion
          jq -n \
            --arg repo "${{ github.repository }}" \
            --argjson run_id "${{ github.run_id }}" \
            --argjson run_attempt "${{ github.run_attempt }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%S.000)" \
            --arg suspect_commit "${{ inputs.suspect_commit }}" \
            --argjson pr_number "${{ inputs.pr_number }}" \
            --arg signal_key "$(echo "$SIGNAL_PATTERN" | jq -r '.signal_key // ""')" \
            --arg signal_source "$(echo "$SIGNAL_PATTERN" | jq -r '.signal_source // ""')" \
            --arg workflow_name "$(echo "$SIGNAL_PATTERN" | jq -r '.workflow_name // ""')" \
            --arg verdict "$(echo "$VERDICT_JSON" | jq -r '.verdict // ""')" \
            --argjson confidence "$(echo "$VERDICT_JSON" | jq -r '.confidence // 0')" \
            --arg summary "$(echo "$VERDICT_JSON" | jq -r '.summary // ""')" \
            --arg causal_reasoning "$(echo "$VERDICT_JSON" | jq -r '.causal_reasoning // ""')" \
            '{
              repo: $repo,
              run_id: $run_id,
              run_attempt: $run_attempt,
              timestamp: $timestamp,
              suspect_commit: $suspect_commit,
              pr_number: $pr_number,
              signal_key: $signal_key,
              signal_source: $signal_source,
              workflow_name: $workflow_name,
              verdict: $verdict,
              confidence: $confidence,
              summary: $summary,
              causal_reasoning: $causal_reasoning
            }' > /tmp/advisor_verdict.json

          aws s3 cp /tmp/advisor_verdict.json \
            "s3://ossci-raw-job-status/autorevert_advisor_verdicts/${{ github.repository }}/${{ github.run_id }}_${{ github.run_attempt }}.json"

      - name: Upload usage metrics
        if: always()
        uses: pytorch/test-infra/.github/actions/upload-claude-usage@main
